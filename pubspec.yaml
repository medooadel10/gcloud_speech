name: gcloud_speech
description: >
  A comprehensive Flutter package for Google Cloud Speech-to-Text.
  Supports audio recording (start / pause / resume / stop), real-time
  streaming transcription, and post-recording batch transcription with
  extensive configuration options.

version: 1.0.0
homepage: https://github.com/medooadel10/gcloud_speech
repository: https://github.com/medooadel10/gcloud_speech

environment:
  sdk: ^3.11.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client – used to call the Google Cloud Speech REST API.
  dio: ^5.4.0

  # Cross-platform audio recorder – provides both file and stream recording.
  record: ^5.2.1

  # Provides platform-appropriate directories (documents, temp, etc.).
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

